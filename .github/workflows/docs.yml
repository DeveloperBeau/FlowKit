name: Publish DocC

on:
  push:
    branches: [main]
    paths:
      - 'Sources/Flow/Documentation.docc/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Build and publish docs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/setup-swift@v1
        with:
          swift-version: '6.3'
      - name: Build documentation
        run: |
          rm -rf docs
          swift package --allow-writing-to-directory ./docs \
            generate-documentation --target Flow \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path FlowKit \
            --output-path ./docs
      - name: Open PR with regenerated docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain docs)" ]; then
            echo "No documentation changes."
            exit 0
          fi
          BRANCH="auto-docs/${{ github.sha }}"
          git config user.name "DeveloperBeau"
          git config user.email "DeveloperBeau@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs
          git commit -m "Regenerate documentation from ${{ github.sha }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Regenerate documentation" \
            --body "Auto-generated from commit ${{ github.sha }}." \
            --base main --head "$BRANCH"
