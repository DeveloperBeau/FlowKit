name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-swift@v1
        with:
          swift-version: '6.3'
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -j 2
      - name: Test with coverage
        run: swift test -j 2 --enable-code-coverage
      - name: Coverage report
        run: |
          BIN=$(find .build -name "FlowKitPackageTests.xctest" -type d | head -1)
          PROF=$(find .build -name "default.profdata" | head -1)
          if [ -n "$BIN" ] && [ -n "$PROF" ]; then
            xcrun llvm-cov report "$BIN/Contents/MacOS/FlowKitPackageTests" \
              -instr-profile="$PROF" \
              -ignore-filename-regex='Tests/|.build/' || true
          fi

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-swift@v1
        with:
          swift-version: '6.3'
      - name: Show Swift version
        run: swift --version
      - name: Build non-UI targets (release config)
        run: swift build -j 2 -c release --target Flow --target FlowTesting
      - name: Test non-UI targets (release config)
        run: |
          swift test -j 2 -c release \
            --filter FlowSharedModelsTests \
            --filter FlowCoreTests \
            --filter FlowOperatorsTests \
            --filter FlowHotStreamsTests \
            --filter FlowTestClockTests \
            --filter FlowTestingCoreTests \
            --filter FlowPublicAPITests \
            --filter FlowTestingPublicAPITests

  ios:
    name: iOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-xcode@40aba41a701737f3935987496f9f511f72af875c
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Install iOS simulator runtime
        run: sudo xcodebuild -runFirstLaunch && xcodebuild -downloadPlatform iOS
      - name: Test iOS Simulator (with coverage)
        run: |
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -enableCodeCoverage YES \
            -derivedDataPath .build-ios \
            -resultBundlePath .build-ios/Result.xcresult
      - name: Coverage report
        if: always()
        run: |
          PROF=$(find .build-ios -name "Coverage.profdata" | head -1)
          if [ -n "$PROF" ]; then
            ARGS=()
            for x in .build-ios/Build/Products/Debug-iphonesimulator/*.xctest; do
              name=$(basename "$x" .xctest)
              bin="$x/$name"
              [ -f "$bin" ] && ARGS+=(-object "$bin")
            done
            xcrun llvm-cov report "${ARGS[@]}" \
              -instr-profile="$PROF" \
              -ignore-filename-regex='Tests/|.build/|checkouts/|DerivedSources/' || true
          fi

  ipados:
    name: iPadOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-xcode@40aba41a701737f3935987496f9f511f72af875c
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Install iOS simulator runtime
        run: sudo xcodebuild -runFirstLaunch && xcodebuild -downloadPlatform iOS
      - name: Test iPad Simulator
        run: |
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5),OS=latest' \
            -derivedDataPath .build-ipados

  tvos:
    name: tvOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-xcode@40aba41a701737f3935987496f9f511f72af875c
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Install tvOS simulator runtime
        run: sudo xcodebuild -runFirstLaunch && xcodebuild -downloadPlatform tvOS
      - name: Test tvOS Simulator
        run: |
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination 'platform=tvOS Simulator,name=Apple TV,OS=latest' \
            -derivedDataPath .build-tvos

  watchos:
    name: watchOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-xcode@40aba41a701737f3935987496f9f511f72af875c
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Install watchOS simulator runtime
        run: sudo xcodebuild -runFirstLaunch && xcodebuild -downloadPlatform watchOS
      - name: Test watchOS Simulator
        run: |
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 11 (46mm),OS=latest' \
            -derivedDataPath .build-watchos

  visionos:
    name: visionOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/resolve-xcode@40aba41a701737f3935987496f9f511f72af875c
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Install visionOS simulator runtime
        run: |
          sudo xcodebuild -runFirstLaunch
          for i in 1 2 3; do
            if xcodebuild -downloadPlatform visionOS; then exit 0; fi
            echo "downloadPlatform attempt $i failed; sleeping before retry"
            sleep 15
          done
          exit 1
      - name: Test visionOS Simulator
        run: |
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro,OS=latest' \
            -derivedDataPath .build-visionos
