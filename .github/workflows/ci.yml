name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep "^Xcode" | grep -v "beta" | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE"
          fi
          xcodebuild -version
          swift --version
      - name: Build
        run: swift build
      - name: Test with coverage
        run: swift test --enable-code-coverage
      - name: Coverage report
        run: |
          xcrun llvm-cov report \
            .build/arm64-apple-macosx/debug/FlowKitPackageTests.xctest/Contents/MacOS/FlowKitPackageTests \
            -instr-profile=.build/arm64-apple-macosx/debug/codecov/default.profdata \
            -ignore-filename-regex='Tests/|.build/'

  linux:
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.3
    steps:
      - uses: actions/checkout@v4
      - name: Build non-UI targets
        run: swift build --target Flow --target FlowTesting
      - name: Test non-UI targets
        run: |
          swift test \
            --filter FlowSharedModelsTests \
            --filter FlowCoreTests \
            --filter FlowOperatorsTests \
            --filter FlowHotStreamsTests \
            --filter FlowTestClockTests \
            --filter FlowTestingCoreTests \
            --filter FlowPublicAPITests \
            --filter FlowTestingPublicAPITests
