name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.3 toolchain
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"
      - name: Versions
        run: |
          swift --version
          xcodebuild -version || true
      - name: Build
        run: swift build
      - name: Test with coverage
        run: swift test --enable-code-coverage
      - name: Coverage report
        run: |
          BIN=$(find .build -name "FlowKitPackageTests.xctest" -type d | head -1)
          PROF=$(find .build -name "default.profdata" | head -1)
          if [ -n "$BIN" ] && [ -n "$PROF" ]; then
            xcrun llvm-cov report "$BIN/Contents/MacOS/FlowKitPackageTests" \
              -instr-profile="$PROF" \
              -ignore-filename-regex='Tests/|.build/' || true
          fi

  linux:
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - uses: actions/checkout@v4
      - name: Build non-UI targets in release config
        run: swift build -c release --target Flow --target FlowTesting
      - name: Test non-UI targets in release config
        run: |
          swift test -c release \
            --filter FlowSharedModelsTests \
            --filter FlowCoreTests \
            --filter FlowOperatorsTests \
            --filter FlowHotStreamsTests \
            --filter FlowTestClockTests \
            --filter FlowTestingCoreTests \
            --filter FlowPublicAPITests \
            --filter FlowTestingPublicAPITests
