name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: DeveloperBeau/resolve-swift@95dd7376c9df6efd1252713de2edbc4ae6df0663  # v1
        with:
          swift-version: '6.3'
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -j 2
      - name: Test with coverage
        run: swift test -j 2 --enable-code-coverage
      - name: Coverage report
        run: |
          BIN=$(find .build -name "FlowKitPackageTests.xctest" -type d | head -1)
          PROF=$(find .build -name "default.profdata" | head -1)
          if [ -n "$BIN" ] && [ -n "$PROF" ]; then
            xcrun llvm-cov report "$BIN/Contents/MacOS/FlowKitPackageTests" \
              -instr-profile="$PROF" \
              -ignore-filename-regex='Tests/|.build/' || true
          fi

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: DeveloperBeau/resolve-swift@95dd7376c9df6efd1252713de2edbc4ae6df0663  # v1
        with:
          swift-version: '6.3'
      - name: Show Swift version
        run: swift --version
      - name: Build non-UI targets (release config)
        run: swift build -j 2 -c release --target Flow --target FlowTesting
      - name: Test non-UI targets (release config)
        run: |
          swift test -j 2 -c release \
            --filter FlowSharedModelsTests \
            --filter FlowCoreTests \
            --filter FlowOperatorsTests \
            --filter FlowHotStreamsTests \
            --filter FlowTestClockTests \
            --filter FlowTestingCoreTests \
            --filter FlowPublicAPITests \
            --filter FlowTestingPublicAPITests

  ios:
    name: iOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: DeveloperBeau/resolve-xcode@a1ffc9f40f2f638592b75f17b347af7034f41bf4
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Install iOS simulator runtime
        run: |
          sudo xcodebuild -runFirstLaunch
          for i in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then exit 0; fi
            echo "downloadPlatform attempt $i failed; sleeping before retry"
            sleep 15
          done
          exit 1
      - name: Test iOS Simulator (with coverage)
        run: |
          SIMULATOR=$(xcrun simctl list devices available --json \
            | jq -r '.devices | to_entries[] | .value[] | select(.isAvailable) | .name' \
            | grep -E '^iPhone [0-9]+[a-z]?$' \
            | sort -uV | tail -1)
          [ -n "$SIMULATOR" ] || { echo "No iPhone simulator found"; exit 1; }
          echo "Using simulator: $SIMULATOR"
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=latest" \
            -enableCodeCoverage YES \
            -derivedDataPath .build-ios \
            -resultBundlePath .build-ios/Result.xcresult
      - name: Coverage report
        if: always()
        run: |
          PROF=$(find .build-ios -name "Coverage.profdata" | head -1)
          if [ -n "$PROF" ]; then
            ARGS=()
            for x in .build-ios/Build/Products/Debug-iphonesimulator/*.xctest; do
              name=$(basename "$x" .xctest)
              bin="$x/$name"
              [ -f "$bin" ] && ARGS+=(-object "$bin")
            done
            xcrun llvm-cov report "${ARGS[@]}" \
              -instr-profile="$PROF" \
              -ignore-filename-regex='Tests/|.build/|checkouts/|DerivedSources/' || true
          fi

  ipados:
    name: iPadOS (Simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: DeveloperBeau/resolve-xcode@a1ffc9f40f2f638592b75f17b347af7034f41bf4
        with:
          xcode-version: '26.5'
      - name: Show toolchain
        run: xcodebuild -version && swift --version
      - name: Install iOS simulator runtime
        run: |
          sudo xcodebuild -runFirstLaunch
          for i in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then exit 0; fi
            echo "downloadPlatform attempt $i failed; sleeping before retry"
            sleep 15
          done
          exit 1
      - name: Test iPad Simulator
        run: |
          NAMES=$(xcrun simctl list devices available --json \
            | jq -r '.devices | to_entries[] | .value[] | select(.isAvailable) | .name')
          SIMULATOR=$(echo "$NAMES" | grep -E '^iPad Pro [0-9]+-inch \(M[0-9]+\)$' | sort -uV | tail -1)
          [ -n "$SIMULATOR" ] || SIMULATOR=$(echo "$NAMES" | grep -E '^iPad ' | sort -uV | tail -1)
          [ -n "$SIMULATOR" ] || { echo "No iPad simulator found"; exit 1; }
          echo "Using simulator: $SIMULATOR"
          xcodebuild test \
            -scheme FlowKit-Package \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=latest" \
            -derivedDataPath .build-ipados

