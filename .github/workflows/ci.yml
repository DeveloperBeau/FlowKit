            | jq -r '
                [.devices | to_entries[] | select(.key | test("tvOS-"))
                  | {runtime: .key, devices: .value}]
                | sort_by(.runtime) | reverse[] | .devices[]
                | select(.isAvailable and (.name | startswith("Apple TV")))
                | .udid
