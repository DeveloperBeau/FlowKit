name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
          - runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeveloperBeau/setup-swift@v1
        with:
          swift-version: '6.3'
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
        if: matrix.runner == 'macos-latest'
      - name: Build (Linux non-UI targets)
        run: swift build --target Flow --target FlowTesting
        if: matrix.runner == 'ubuntu-24.04'
      - name: Test (macOS, full suite, with coverage)
        if: matrix.runner == 'macos-latest'
        run: swift test --enable-code-coverage
      - name: Coverage report (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          BIN=$(find .build -name "FlowKitPackageTests.xctest" -type d | head -1)
          PROF=$(find .build -name "default.profdata" | head -1)
          if [ -n "$BIN" ] && [ -n "$PROF" ]; then
            xcrun llvm-cov report "$BIN/Contents/MacOS/FlowKitPackageTests" \
              -instr-profile="$PROF" \
              -ignore-filename-regex='Tests/|.build/' || true
          fi
      - name: Test (Linux, non-UI targets)
        if: matrix.runner == 'ubuntu-24.04'
        run: |
          swift test \
            --filter FlowSharedModelsTests \
            --filter FlowCoreTests \
            --filter FlowOperatorsTests \
            --filter FlowHotStreamsTests \
            --filter FlowTestClockTests \
            --filter FlowTestingCoreTests \
            --filter FlowPublicAPITests \
            --filter FlowTestingPublicAPITests
