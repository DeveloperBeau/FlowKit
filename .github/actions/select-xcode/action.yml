name: Select Xcode (Swift 6.3)
description: >-
  Selects whichever installed Xcode ships Swift 6.3, newest first, so the
  toolchain matches the package's tools version. Fails if none does.

runs:
  using: composite
  steps:
    - name: Select an installed Xcode that provides Swift 6.3
      shell: bash
      run: |
        # No pinned Xcode: pick whichever installed Xcode ships Swift 6.3,
        # newest first, so the toolchain matches the package's tools version.
        for xcode in $(ls -d /Applications/Xcode*.app | sort -Vr); do
          if "$xcode/Contents/Developer/usr/bin/swift" --version 2>&1 | grep -q "Swift version 6.3"; then
            sudo xcode-select -s "$xcode"
            break
          fi
        done
        xcodebuild -version
        swift --version
        swift --version 2>&1 | grep -q "Swift version 6.3" \
          || { echo "::error::No installed Xcode provides Swift 6.3"; exit 1; }
